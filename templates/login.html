<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access Stock Investment Analyzer — Enter your unique access code to continue.">
    <title>Login — StockAnalyzer PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- Animated Background Orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="login-section">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="login-lock-ring">
                    <span class="login-lock-icon">🔒</span>
                </div>
            </div>

            <h1 class="login-title">Stock<span class="accent">Analyzer</span> <span class="pro-badge">PRO</span></h1>
            <p class="login-subtitle">Enter your unique access code to continue</p>

            {% if error %}
            <div class="login-error">
                <span class="login-error-icon">⚠️</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login" class="login-form">
                <div class="login-input-wrap">
                    <span class="login-input-icon">🔑</span>
                    <input type="password" name="access_code" id="accessCodeInput" class="login-input"
                        placeholder="Enter access code" autocomplete="off" autofocus required>
                </div>
                <button type="submit" class="login-btn">
                    <span class="btn-text">Unlock Access</span>
                    <span class="btn-icon">→</span>
                </button>
            </form>

            <p class="login-footer-text">This application is private. Contact the owner for access.</p>
        </div>
    </div>
</body>

</html>
