<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockAnalyzer PRO - Secure Entry</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Core Colors */
            --bg-deep: #05050A;
            --chart-glow-1: #00FF87; /* Neon Green */
            --chart-glow-2: #60EFFF; /* Cyan */
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(20, 20, 25, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --brand-blue: #0A84FF;
            --error-red: #FF453A;
            --success-green: #32D74B;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-deep);
            font-family: var(--font-main);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- STUNNING BACKGROUND ENVIRONMENT --- */
        .environment {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: radial-gradient(circle at 50% 100%, #111122 0%, var(--bg-deep) 70%);
        }

        /* 1. Subtle, elegant background grid */
        .hero-grid {
            position: absolute;
            width: 200vw;
            height: 200vh;
            top: -50vh;
            left: -50vw;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(1000px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            mask-image: radial-gradient(ellipse at center, black 10%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 10%, transparent 70%);
        }

        @keyframes gridMove {
            0% { transform: perspective(1000px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(1000px) rotateX(60deg) translateY(60px) translateZ(-200px); }
        }

        /* 2. Massive Animated Glowing Spline Chart */
        .chart-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            opacity: 0.8;
            pointer-events: none;
        }

        .chart-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* The glowing stroke of the chart */
        .chart-line {
            fill: none;
            stroke: url(#chartGradient);
            stroke-width: 4;
            filter: drop-shadow(0 0 15px var(--chart-glow-1));
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: drawChart 4s cubic-bezier(0.1, 0.8, 0.1, 1) forwards, floatChart 8s ease-in-out infinite alternate 4s;
        }

        /* The glowing filled area underneath the chart */
        .chart-fill {
            fill: url(#fillGradient);
            opacity: 0;
            animation: fadeInFill 3s ease-out forwards 1.5s;
        }

        @keyframes drawChart {
            to { stroke-dashoffset: 0; }
        }

        @keyframes fadeInFill {
            to { opacity: 0.6; }
        }

        @keyframes floatChart {
            0% { transform: translateY(0); }
            100% { transform: translateY(15px); }
        }

        /* 3. Floating "Market Data" Particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            font-size: 12px;
            font-weight: 600;
            font-family: 'SF Mono', monospace;
            opacity: 0;
            animation: floatParticle 10s linear infinite;
        }

        .particle.green { color: var(--chart-glow-1); filter: drop-shadow(0 0 8px var(--chart-glow-1)); }
        .particle.cyan { color: var(--chart-glow-2); filter: drop-shadow(0 0 8px var(--chart-glow-2)); }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        /* --- HIGH-END VISION OS STYLE CARD --- */
        .login-wrapper {
            position: relative;
            z-index: 10;
            perspective: 1000px;
        }

        .glass-card {
            width: 420px;
            padding: 48px;
            border-radius: 24px;
            background: linear-gradient(145deg, var(--glass-bg), rgba(10, 10, 12, 0.6));
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 var(--glass-highlight);
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Subtle noise texture overlay for realism */
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }

        /* Floating Logo Orb */
        .brand-orb {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chart-glow-1), var(--chart-glow-2));
            box-shadow: 0 0 30px rgba(0, 255, 135, 0.3), inset 0 2px 4px rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 24px;
            transform: translateZ(30px); /* 3D pop */
        }

        /* Typography */
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-align: center;
            transform: translateZ(20px);
        }

        p.subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 40px;
            transform: translateZ(10px);
        }

        /* Input Field styling */
        .input-group {
            width: 100%;
            position: relative;
            margin-bottom: 24px;
            transform: translateZ(15px);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
        }

        input[type="password"] {
            width: 100%;
            height: 56px;
            padding: 0 20px 0 48px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            font-family: var(--font-main);
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--chart-glow-2);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 15px rgba(96, 239, 255, 0.2);
        }

        input[type="password"]::placeholder {
            color: rgba(255,255,255,0.3);
            letter-spacing: normal;
        }

        /* Stunning Submit Button */
        button {
            width: 100%;
            height: 56px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--brand-blue), #005bb5);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(10, 132, 255, 0.3), inset 0 1px 1px rgba(255,255,255,0.3);
            transform: translateZ(20px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        button:hover {
            transform: translateZ(25px) translateY(-2px);
            box-shadow: 0 15px 25px rgba(10, 132, 255, 0.4), inset 0 1px 1px rgba(255,255,255,0.4);
        }

        button:hover::before {
            left: 150%;
        }

        /* Error States */
        input.error { border-color: var(--error-red) !important; animation: shake 0.4s ease-in-out; }
        .error-message {
            color: var(--error-red);
            font-size: 13px;
            margin-top: 8px;
            text-align: left;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.3s ease;
            position: absolute;
            bottom: -24px;
        }
        .error-message.visible { opacity: 1; transform: translateY(0); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Loaders & Success */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .success-overlay {
            position: absolute;
            inset: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 20;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .success-icon {
            width: 64px; height: 64px;
            background: var(--success-green);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: white;
            box-shadow: 0 0 30px rgba(50, 215, 75, 0.4);
            margin-bottom: 16px;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-overlay.active .success-icon { transform: scale(1); }
        .success-overlay h2 { font-size: 24px; margin-bottom: 8px; }

    </style>
</head>
<body>

    <!-- STUNNING BACKGROUND ENVIRONMENT -->
    <div class="environment">
        <div class="hero-grid"></div>

        <!-- Floating Particles -->
        <div class="particles" id="particles"></div>

        <!-- Massive Glowing Chart -->
        <div class="chart-container">
            <svg class="chart-svg" viewBox="0 0 1000 300" preserveAspectRatio="none">
                <defs>
                    <!-- Neon Glow Gradient for Stroke -->
                    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#00FF87" />
                        <stop offset="50%" stop-color="#60EFFF" />
                        <stop offset="100%" stop-color="#00FF87" />
                    </linearGradient>
                    <!-- Fade out fill for the bottom -->
                    <linearGradient id="fillGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#00FF87" stop-opacity="0.3" />
                        <stop offset="100%" stop-color="#60EFFF" stop-opacity="0" />
                    </linearGradient>
                </defs>

                <!-- Solid Fill underneath -->
                <path class="chart-fill" d="M0,300 L0,200 C150,150 250,250 400,180 C500,130 600,80 750,140 C850,180 950,50 1000,20 L1000,300 Z" />
                
                <!-- Glowing Spline Line -->
                <path class="chart-line" d="M0,200 C150,150 250,250 400,180 C500,130 600,80 750,140 C850,180 950,50 1000,20" />
            </svg>
        </div>
    </div>

    <!-- HIGH-END LOGIN CARD -->
    <div class="login-wrapper" id="cardWrapper">
        <div class="glass-card">
            
            <div class="brand-orb">✨</div>
            <h1>StockAnalyzer PRO</h1>
            <p class="subtitle">Secure terminal access required.</p>

            <form id="loginForm" style="width: 100%;">
                <!-- Traps for autofill -->
                <input type="text" style="display:none" autocomplete="username">
                <input type="password" style="display:none" autocomplete="current-password">

                <div class="input-group">
                    <div class="input-icon">🔒</div>
                    <input type="password" id="access_code" name="access_code" placeholder="Enter Access Code" autocomplete="new-password" autofocus required>
                    <div id="errorText" class="error-message">Invalid access code</div>
                </div>

                <button type="submit" id="submitBtn">
                    <span id="btnText">Authenticate</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>
            </form>

            <!-- Embedded Success State -->
            <div class="success-overlay" id="successOverlay">
                <div class="success-icon">✓</div>
                <h2>Terminal Unlocked</h2>
                <p class="subtitle" style="margin-bottom:0; font-size: 14px;">Establishing secure connection...</p>
            </div>

        </div>
    </div>

    <script>
        // --- Generate Floating Data Particles ---
        const particleContainer = document.getElementById('particles');
        const values = [
            'AAPL +1.8%', 'NVDA -0.4%', 'TSLA +3.2%', 'MSFT +0.9%', 
            'AMZN -1.1%', 'GOOGL +2.1%', 'META +1.5%', 'NFLX -2.0%',
            '+5.8%', '▲ 142.50', '▼ 89.20', 'BUY', 'RSI 74', 'VOL 1.2M'
        ];
        const colors = ['green', 'cyan'];

        function createParticle() {
            const p = document.createElement('div');
            const colorClass = colors[Math.floor(Math.random() * colors.length)];
            const text = values[Math.floor(Math.random() * values.length)];
            
            p.className = `particle ${colorClass}`;
            p.innerText = text;
            
            p.style.left = `${Math.random() * 100}vw`;
            p.style.animationDuration = `${8 + Math.random() * 5}s`;
            p.style.animationDelay = `${Math.random() * 5}s`;
            
            particleContainer.appendChild(p);

            // Remove particle after animation
            setTimeout(() => {
                p.remove();
            }, 15000);
        }

        // Create particles periodically
        setInterval(createParticle, 800);
        for(let i=0; i<10; i++) setTimeout(createParticle, i*200);


        // --- Mouse Parallax Effect on Card ---
        const wrapper = document.getElementById('cardWrapper');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            wrapper.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset transform on mouse leave
        document.addEventListener('mouseleave', () => {
            wrapper.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });


        // --- Login Logic ---
        const loginForm = document.getElementById('loginForm');
        const codeInput = document.getElementById('access_code');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const successOverlay = document.getElementById('successOverlay');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset states
            codeInput.classList.remove('error');
            errorText.classList.remove('visible');
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';
            submitBtn.style.pointerEvents = 'none';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `access_code=${encodeURIComponent(codeInput.value)}`
                });

                if (response.redirected) {
                    // Success! Show stunning overlay before redirecting
                    successOverlay.classList.add('active');
                    setTimeout(() => {
                        window.location.href = response.url;
                    }, 1200);
                } else {
                    // Shake animation
                    codeInput.style.animation = 'none';
                    void codeInput.offsetWidth; // trigger reflow
                    codeInput.style.animation = 'shake 0.4s ease-in-out';
                    codeInput.style.borderColor = 'var(--error-text)';
                    
                    setTimeout(() => {
                        codeInput.style.borderColor = '';
                        codeInput.style.animation = '';
                    }, 2000);
                }
            } catch (err) {
                submitBtn.disabled = false;
                btnText.textContent = 'Sign In';
                btnSpinner.style.display = 'none';
                errorText.textContent = 'Connection error. Please try again.';
                errorText.classList.add('visible');
            }
        });
    </script>
</body>
</html>
